# host-actions.conf — Whitelisted host-side actions TRII can request
# Format: action-name=shell-command
# No interpolation from agent output. Commands run as-is.

restart-gateway=nemoclaw my-assistant connect -- openclaw gateway restart
reload-listener=launchctl kickstart -k gui/$(id -u)/com.trii.slack-listener
refresh-tokens=$TRII_HOME/refresh-vertex-token.sh
sync-project-gws=tar -C $HOME/Desktop/Projects.nosync -cf - --exclude=node_modules --exclude=.venv --exclude=__pycache__ --exclude=.git GWS_CLI | ssh -F /tmp/nc-ssh openshell-my-assistant 'tar -C /sandbox -xf -'
sync-project-knowledge=tar -C $HOME/Desktop/Projects.nosync -cf - --exclude=node_modules --exclude=.venv --exclude=__pycache__ --exclude=.git KNOWLEDGE_CLI | ssh -F /tmp/nc-ssh openshell-my-assistant 'tar -C /sandbox -xf -'
