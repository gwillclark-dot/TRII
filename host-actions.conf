# host-actions.conf — Whitelisted host-side actions TRII can request
# Format: action-name=shell-command
# No interpolation from agent output. Commands run as-is.

restart-gateway=openshell sandbox ssh-config my-assistant > /tmp/nc-ssh 2>/dev/null && chmod 600 /tmp/nc-ssh && ssh -T -F /tmp/nc-ssh openshell-my-assistant 'openclaw gateway restart 2>&1' && echo 'Gateway restarted'
reload-listener=launchctl kickstart -k gui/$(id -u)/com.trii.slack-listener && echo 'Listener reloaded'
refresh-tokens=$TRII_HOME/refresh-vertex-token.sh > /dev/null && echo 'Token refreshed'
sync-project-gws=openshell sandbox ssh-config my-assistant > /tmp/nc-ssh 2>/dev/null && chmod 600 /tmp/nc-ssh && tar -C $HOME/Desktop/Projects.nosync -cf - --exclude=node_modules --exclude=.venv --exclude=__pycache__ --exclude=.git GWS_CLI | ssh -F /tmp/nc-ssh openshell-my-assistant 'tar -C /sandbox -xf -' && echo 'GWS_CLI synced'
sync-project-knowledge=openshell sandbox ssh-config my-assistant > /tmp/nc-ssh 2>/dev/null && chmod 600 /tmp/nc-ssh && tar -C $HOME/Desktop/Projects.nosync -cf - --exclude=node_modules --exclude=.venv --exclude=__pycache__ --exclude=.git KNOWLEDGE_CLI | ssh -F /tmp/nc-ssh openshell-my-assistant 'tar -C /sandbox -xf -' && echo 'KNOWLEDGE_CLI synced'
