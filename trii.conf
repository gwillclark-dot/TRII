# trii.conf — Single source of configuration for TRII
# Edit this file on your target machine after cloning.
#
# All variables use :- defaults so environment overrides work.
# e.g. MESSAGE_BACKEND=stdout ./post-message.sh general "test"

# Model backend: nemoclaw | ollama | llamacpp
MODEL_BACKEND="${MODEL_BACKEND:-nemoclaw}"
MODEL_NAME="${MODEL_NAME:-gemma4}"
SANDBOX_NAME="${SANDBOX_NAME:-trii}"         # NemoClaw sandbox name (only if MODEL_BACKEND=nemoclaw)

# Messaging backend: slack | discord | stdout
MESSAGE_BACKEND="${MESSAGE_BACKEND:-slack}"
DEFAULT_CHANNEL="${DEFAULT_CHANNEL:-general}" # Logical name, resolved via channels.json

# Paths (set on target machine)
TRII_HOME="${TRII_HOME:-$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)}"

# Execution
TIMEOUT="${TIMEOUT:-900}"
