# trii.conf — TRII harness configuration
# All variables use :- defaults so environment overrides work.

# Agent CLI to spawn per project (the "hands")
AGENT_CMD="${AGENT_CMD:-claude --channels --dangerously-skip-permissions}"

# Chat platform: discord (v1) | slack (v2)
CHANNEL_BACKEND="${CHANNEL_BACKEND:-discord}"

# Listener mode:
#   plugin = agent CLI handles the chat connection (claude --channels case)
#   trii   = TRII provides a generic listener that tmux-injects prompts (BYO-CLI case)
LISTENER_MODE="${LISTENER_MODE:-plugin}"

# Paths
TRII_HOME="${TRII_HOME:-$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)}"
