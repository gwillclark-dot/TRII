# trii.conf — Single source of configuration for TRII
# Edit this file on your target machine after cloning.

# Model backend: nemoclaw | ollama | llamacpp
MODEL_BACKEND=nemoclaw
MODEL_NAME=gemma4
SANDBOX_NAME=trii               # NemoClaw sandbox name (only if MODEL_BACKEND=nemoclaw)

# Messaging backend: slack | discord | stdout
MESSAGE_BACKEND=slack
DEFAULT_CHANNEL=general         # Logical name, resolved via channels.json

# Paths (set on target machine)
TRII_HOME="${TRII_HOME:-$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)}"

# Execution
TIMEOUT=900
